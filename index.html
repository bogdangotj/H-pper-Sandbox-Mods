<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hϟpper Sandbox Mods</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f1012; --card: #1c1e22; --text: #e0e0e0; --accent: #4a90e2; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.5; }
        header { text-align: center; margin-bottom: 20px; }
        
        /* Слайдер скриншотов */
        .slider-container { width: 100%; max-width: 500px; margin: 0 auto 20px; border-radius: 10px; overflow: hidden; background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        #screenshot-img { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.5s; }

        .grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 1300px; margin: 0 auto; }
        
        .card { 
            background: var(--card); border-radius: 12px; padding: 20px; 
            width: 100%; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        .card img.mod-icon { width: 70px; height: 70px; margin: 0 auto 15px; border-radius: 15px; display: block; }
        .card h2 { margin: 5px 0; text-align: center; font-size: 1.5em; color: #fff; }
        .card .version { text-align: center; opacity: 0.5; font-size: 0.85em; margin-bottom: 15px; font-weight: 600; }
        
        /* Поддержка длинных текстов и переносов \n */
        .card p { 
            font-size: 0.92em; flex-grow: 1; white-space: pre-wrap; 
            text-align: left; margin-bottom: 20px; color: #bbb;
            word-break: break-word; overflow-wrap: break-word;
        }
        
        .btn { 
            background: var(--accent); color: #fff; text-decoration: none; 
            padding: 12px; border-radius: 8px; font-weight: bold; 
            text-align: center; transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.97); }

        @media (max-width: 480px) { .card { max-width: 100%; } }
    </style>
</head>
<body>

<header>
    <h1 id="site-title">Загрузка...</h1>
    <div class="slider-container">
        <img id="screenshot-img" src="" alt="Screenshot">
    </div>
</header>

<div class="grid" id="mods-container"></div>

<script>
    // --- НАСТРОЙКА СКРИНШОТОВ ---
    const screenshots = ["scr1.png", "scr2.png", "scr3.png"]; // Добавляй сюда имена файлов
    let currentScr = 0;
    const scrImg = document.getElementById('screenshot-img');

    function rotateScreenshots() {
        if (screenshots.length === 0) return;
        scrImg.style.opacity = 0;
        setTimeout(() => {
            scrImg.src = screenshots[currentScr];
            scrImg.style.opacity = 1;
            currentScr = (currentScr + 1) % screenshots.length;
        }, 500);
    }
    
    if (screenshots.length > 0) {
        scrImg.src = screenshots[0];
        setInterval(rotateScreenshots, 10000); // 10 секунд
    }

    // --- ЗАГРУЗКА КОНФИГА ---
    async function init() {
        try {
            const res = await fetch('config.json');
            const data = await res.json();
            
            document.getElementById('site-title').innerText = data.siteName;
            const container = document.getElementById('mods-container');
            
            data.mods.forEach(mod => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${mod.icon}" class="mod-icon" alt="icon">
                    <h2>${mod.type}</h2>
                    <div class="version">v${mod.version}</div>
                    <p>${mod.description}</p>
                    <a href="${mod.link}" class="btn">СКАЧАТЬ APK</a>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('site-title').innerText = "Ошибка загрузки";
        }
    }

    init();
</script>

</body>
</html>
