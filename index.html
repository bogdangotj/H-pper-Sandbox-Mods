<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hϟpper Sandbox Mods</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0c0e; --card: #16181d; --text: #cfd2d6; --accent: #3b82f6; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; line-height: 1.4; }
        header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        h1 { color: #fff; font-size: 1.8rem; margin-bottom: 15px; }

        /* Слайдер скриншотов */
        .slider-box { 
            width: 95%; max-width: 600px; margin: 0 auto 25px; 
            border-radius: 12px; overflow: hidden; background: #000; 
            aspect-ratio: 16/9; border: 1px solid #2d2f34; position: relative;
        }
        #screenshot-img { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.4s; }

        /* Сетка карточек */
        .grid { 
            display: flex; flex-wrap: wrap; gap: 20px; 
            justify-content: center; max-width: 1400px; margin: 0 auto; 
        }
        
        .card { 
            background: var(--card); border-radius: 14px; padding: 20px; 
            width: 100%; max-width: 350px; border: 1px solid #2d2f34;
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        .mod-icon { width: 80px; height: 80px; margin: 0 auto 15px; border-radius: 18px; display: block; background: #222; }
        .card h2 { margin: 5px 0; text-align: center; font-size: 1.4rem; color: #fff; }
        .version-badge { 
            text-align: center; opacity: 0.6; font-size: 0.8rem; 
            margin-bottom: 15px; font-weight: bold; color: var(--accent);
        }
        
        /* Описание с поддержкой \n и длинных слов */
        .card p { 
            font-size: 0.9rem; flex-grow: 1; white-space: pre-wrap; 
            text-align: left; margin-bottom: 20px; color: #a1a1aa;
            word-break: break-word; overflow-wrap: anywhere;
        }
        
        .download-btn { 
            background: var(--accent); color: #fff; text-decoration: none; 
            padding: 14px; border-radius: 10px; font-weight: 700; 
            text-align: center; font-size: 1rem;
        }
        .download-btn:active { background: #2563eb; transform: scale(0.98); }

        @media (max-width: 600px) { h1 { font-size: 1.4rem; } .card { max-width: 100%; } }
    </style>
</head>
<body>

<header>
    <h1 id="main-title">Hϟpper Sandbox Mods</h1>
    <div class="slider-box">
        <img id="screenshot-img" src="scr1.png" alt="Screen">
    </div>
</header>

<div class="grid" id="container"></div>

<script>
    // ТВОЙ КОНФИГ ПРЯМО ЗДЕСЬ (Никаких внешних файлов, чтобы точно работало)
    const config = {
      "siteName": "Hϟpper Sandbox Mods",
      "screenshots": ["scr1.png", "scr2.png", "scr3.png"],
      "mods": [
        {
          "type": "PRIV",
          "version": "0.1",
          "icon": "4ic.png",
          "description": "Что такое 𝗛ϟ𝗽𝗽𝗲𝗿 𝗦𝗮𝗻𝗱𝗯𝗼𝘅 𝗣𝗥𝗜𝗩 𝗺𝗼𝗱?\nЧтож, это мой четвертый мод на известную игру 𝗛ϟ𝗽𝗽𝗲𝗿 𝗦𝗮𝗻𝗱𝗯𝗼𝘅 который является приватккой хайпер, в нём отдельные сервера и меньше задержки из-за того что нет нагрузки, вы все еще можете играть с другими если у них тоже будет 𝗣𝗥𝗜𝗩 𝗺𝗼𝗱\n\n(𝗣𝗥𝗜𝗩 основан на моде 𝗟𝗜𝗧𝗘)\n\nВсе это дает ощутить чистый опыт от хайпера, ведь игроков мешающих вам нет)\n\nПриятного времяпровождения! 🌿 😊\n\nАвтор мода: @𝗯𝗼𝗴𝗱𝗮𝗻𝗴𝗼𝘁𝗷",
          "link": "https://t.me/HypperSandbox2026"
        },
        {
          "type": "LITE",
          "version": "0.7",
          "icon": "2ic.png",
          "description": "Что такое 𝗛ϟ𝗽𝗽𝗲𝗿 𝗦𝗮𝗻𝗱𝗯𝗼𝘅 𝗟𝗜𝗧𝗘 𝗺𝗼𝗱?\nЧтож, это мой второй мод на известную игру 𝗛ϟ𝗽𝗽𝗲𝗿 𝗦𝗮𝗻𝗱𝗯𝗼𝘅 который изначально нацелен на то чтобы дать чистый геймплей...\n\n-Даны все анимации, шапки, скины игры\n-BetaHub (+)\n-BETA (переименовано в LITE)\n-Удалена реклама\n\nПриятного времяпровождения! 🌿 😊\n\nАвтор мода: @𝗯𝗼𝗴𝗱𝗮𝗻𝗴𝗼𝘁𝗷",
          "link": "https://t.me/HypperSandbox2026/589"
        },
        {
          "type": "DEV",
          "version": "1.4",
          "icon": "1ic.png",
          "description": "Что такое 𝗛ϟ𝗽𝗽𝗲𝗿 𝗦𝗮𝗻𝗱𝗯𝗼𝘅 𝗗𝗘𝗩 𝗺𝗼𝗱?\nВ моде 1000 хп и открыт вырезанный контент:\n-HatItem (+)\n-Parking Lot (+)\n-IngameDebugConsole (+)\n-ХП 1000\n\nПриятного времяпровождения! 🌿 😊\n\nАвтор мода: @𝗯𝗼𝗴𝗱𝗮𝗻𝗴𝗼𝘁𝗷",
          "link": "https://t.me/HypperSandbox2026/593"
        },
        {
          "type": "XON",
          "version": "1",
          "icon": "no.png",
          "description": "Разработчик не добавил описание",
          "link": "https://t.me/HypperSandbox2026/534"
        },
        {
          "type": "OLD",
          "version": "0.3",
          "icon": "3ic.png",
          "description": "Ощути старый геймплей на версии 0.5.0.1. Сервера до сих пор работают!\n\nПриятного времяпровождения! 🌿 😊\n\nАвтор мода: @𝗯𝗼𝗴𝗱𝗮𝗻𝗴𝗼𝘁𝗷",
          "link": "https://github.com/твой-репо/downloads/mod_old.apk"
        }
      ]
    };

    // Рендер сайта
    function render() {
        document.getElementById('main-title').innerText = config.siteName;
        const container = document.getElementById('container');
        
        config.mods.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${mod.icon}" class="mod-icon" onerror="this.src='https://via.placeholder.com/80/222/fff?text=APK'">
                <h2>${mod.type}</h2>
                <div class="version-badge">VERSION ${mod.version}</div>
                <p>${mod.description}</p>
                <a href="${mod.link}" class="download-btn">СКАЧАТЬ .APK</a>
            `;
            container.appendChild(card);
        });
    }

    // Логика слайдера
    let currentIdx = 0;
    const imgElement = document.getElementById('screenshot-img');

    function nextSlide() {
        if (!config.screenshots.length) return;
        imgElement.style.opacity = 0;
        setTimeout(() => {
            currentIdx = (currentIdx + 1) % config.screenshots.length;
            imgElement.src = config.screenshots[currentIdx];
            imgElement.style.opacity = 1;
        }, 400);
    }

    if (config.screenshots.length > 1) {
        setInterval(nextSlide, 10000);
    }

    render();
</script>

</body>
</html>
