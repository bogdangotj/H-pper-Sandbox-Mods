<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">

    <title>Hypper Sandbox Mods</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0c0e; --card: #16181d; --text: #cfd2d6; --accent: #3b82f6; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; line-height: 1.4; }
        header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        h1 { color: #fff; font-size: 1.8rem; margin-bottom: 15px; }

        .slider-box { 
            width: 95%; max-width: 600px; margin: 0 auto 25px; 
            border-radius: 12px; overflow: hidden; background: #000; 
            aspect-ratio: 16/9; border: 1px solid #2d2f34; position: relative;
        }
        #screenshot-img { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.4s; }

        .grid { 
            display: flex; flex-wrap: wrap; gap: 20px; 
            justify-content: center; max-width: 1400px; margin: 0 auto; 
        }
        
        .card { 
            background: var(--card); border-radius: 14px; padding: 20px; 
            width: 100%; max-width: 350px; border: 1px solid #2d2f34;
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        .mod-icon { width: 80px; height: 80px; margin: 0 auto 15px; border-radius: 18px; display: block; background: #222; }
        .card h2 { margin: 5px 0; text-align: center; font-size: 1.4rem; color: #fff; }
        .version-badge { 
            text-align: center; opacity: 0.6; font-size: 0.8rem; 
            margin-bottom: 15px; font-weight: bold; color: var(--accent);
        }
        
        .card p { 
            font-size: 0.9rem; flex-grow: 1; white-space: pre-wrap; 
            text-align: left; margin-bottom: 20px; color: #a1a1aa;
            word-break: break-word; overflow-wrap: anywhere;
        }
        
        /* Контейнер для кнопок */
        .download-container { display: flex; flex-direction: column; gap: 8px; }

        .download-btn { 
            color: #fff; text-decoration: none; 
            padding: 14px; border-radius: 10px; font-weight: 700; 
            text-align: center; font-size: 1rem; transition: filter 0.2s;
        }
        .download-btn:active { transform: scale(0.98); filter: brightness(0.8); }

        @media (max-width: 600px) { h1 { font-size: 1.4rem; } .card { max-width: 100%; } }
    </style>
</head>

</header>

<div class="grid" id="container"></div>

        {
          "type": "OLD",
          "version": "0.4",

    function render() {
        document.getElementById('main-title').innerText = config.siteName;
        const container = document.getElementById('container');
        
        config.mods.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Генерируем HTML для кнопок скачивания
            const buttonsHtml = mod.downloads.map(dl => `
                <a href="${dl.link}" 
                   class="download-btn" 
                   style="background-color: ${dl.color}">
                   ${dl.name}
                </a>
            `).join('');

            card.innerHTML = `
                <img src="${mod.icon}" class="mod-icon" onerror="this.src='https://via.placeholder.com/80/222/fff?text=APK'">
                <h2>${mod.type}</h2>
                <div class="version-badge">VERSION ${mod.version}</div>
                <p>${mod.description}</p>
                <div class="download-container">
                    ${buttonsHtml}
                </div>
            `;
            container.appendChild(card);
        });
    }

    let currentIdx = 0;
    const imgElement = document.getElementById('screenshot-img');

    function nextSlide() {
        if (!config.screenshots.length) return;
        imgElement.style.opacity = 0;
        setTimeout(() => {
            currentIdx = (currentIdx + 1) % config.screenshots.length;
            imgElement.src = config.screenshots[currentIdx];
            imgElement.style.opacity = 1;
        }, 400);
    }

    if (config.screenshots.length > 1) {
        setInterval(nextSlide, 10000);
    }

    render();
</script>

</html>
