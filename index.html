<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hϟpper Sandbox Mods</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f4f4; --card: #fff; --text: #333; --accent: #007bff; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            justify-content: center; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .card { 
            background: var(--card); 
            border-radius: 8px; 
            padding: 20px; 
            width: 100%; 
            max-width: 280px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .card img { width: 64px; height: 64px; margin-bottom: 15px; border-radius: 12px; }
        .card h2 { margin: 10px 0; font-size: 1.4em; }
        .card .version { opacity: 0.6; font-size: 0.9em; margin-bottom: 10px; }
        .card p { font-size: 0.95em; flex-grow: 1; }
        .btn { 
            background: var(--accent); 
            color: #fff; 
            text-decoration: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold; 
            width: 100%;
            box-sizing: border-box;
        }
        /* Адаптив для совсем маленьких экранов */
        @media (max-width: 320px) {
            body { padding: 10px; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

<header>
    <h1 id="site-title">Hϟpper Sandbox Mods</h1>
</header>

<div class="grid" id="mods-container">
    </div>

<script>
    fetch('config.json')
        .then(response => response.json())
        .then(data => {
            document.title = data.siteName;
            document.getElementById('site-title').innerText = data.siteName;
            const container = document.getElementById('mods-container');
            
            data.mods.forEach(mod => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${mod.icon}" alt="${mod.type}">
                    <h2>${mod.type}</h2>
                    <div class="version">Версия: ${mod.version}</div>
                    <p>${mod.description}</p>
                    <a href="${mod.link}" class="btn">Скачать APK</a>
                `;
                container.appendChild(card);
            });
        })
        .catch(err => console.error('Ошибка загрузки конфига:', err));
</script>

</body>
</html>
